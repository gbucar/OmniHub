services:
  db:
    image: docker.io/timescale/timescaledb-ha:pg18
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGREST_DB_PASSWORD: ${POSTGREST_DB_PASSWORD}
      AUTH_DB_PASSWORD: ${AUTH_DB_PASSWORD}
      RESEARCHER_DB_PASSWORD: ${RESEARCHER_DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./app_data/db:/var/lib/postgresql:z
      - ./src/db/migrations:/docker-entrypoint-initdb.d:z
  postgrest:
    image: docker.io/postgrest/postgrest:v14.5
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - PGRST_DB_SCHEMAS=api
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_DB_URI=${PGRST_DB_URI}
      - PGRST_JWT_SECRET=${PGRST_JWT_SECRET}
      - PGRST_OPENAPI_SECURITY_ACTIVE=true
      - PGRST_OPENAPI_MODE=ignore-privileges
      - PGRST_SERVER-CORS-ALLOWED-ORIGINS="*"
      # - PGRST_JWT_SECRET_IS_BASE64=${PGRST_JWT_SECRET_IS_BASE64}
    ports:
      - "3000:3000"
  apidocs:
    image: docker.io/swaggerapi/swagger-ui:latest
    restart: unless-stopped
    depends_on:
      - postgrest
    ports:
      - "8080:8080"
    environment:
      - SWAGGER_JSON_URL=${POSTGREST_URL}
